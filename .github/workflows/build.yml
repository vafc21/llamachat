name: build

# Cross-platform build for LlamaChat (macOS / Linux / Windows).
# - Every push to master / PR / manual run builds the app and uploads the
#   installers as run artifacts.
# - Pushing a version tag (e.g. v0.1.0) also publishes a GitHub Release with the
#   installers attached, so anyone can download them. Installers are UNSIGNED by
#   default; see docs/SIGNING.md to make them code-signed (warning-free) for free
#   via SignPath Foundation.

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            triple: aarch64-apple-darwin
            sidecar: bash scripts/build-sidecar.sh
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            sidecar: bash scripts/build-sidecar.sh
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            sidecar: pwsh scripts/build-sidecar.ps1
    runs-on: ${{ matrix.os }}
    env:
      FITLLM_SIDECAR_TRIPLE: ${{ matrix.triple }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux runtime deps + libxdo for enigo input control.
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UI dependencies
        working-directory: ui
        run: npm install

      - name: Build Python sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-sidecar.txt
          ${{ matrix.sidecar }}
        shell: bash

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build app
        run: cargo tauri build
        env:
          # CI has no dev certificate — ad-hoc sign on macOS. Locally the repo
          # config uses a real Apple Development identity (see tauri.conf.json).
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && '-' || '' }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: llamachat-${{ matrix.os }}
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.msi
            target/release/bundle/**/*-setup.exe
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.rpm
          if-no-files-found: ignore

  # Publish a GitHub Release with the installers when a vX.Y.Z tag is pushed:
  #     git tag v0.1.0 && git push origin v0.1.0
  # Installers are UNSIGNED by default — users click "More info -> Run anyway"
  # (Windows) or right-click -> Open (macOS) on first launch. To make them
  # code-signed and warning-free (free for open source), follow docs/SIGNING.md.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the GitHub Release
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      # --- OPTIONAL: code-sign the Windows installers (see docs/SIGNING.md) -----
      # After your SignPath Foundation project is approved, add the repo secret
      # SIGNPATH_API_TOKEN + variable SIGNPATH_ORGANIZATION_ID, then uncomment and
      # adjust the slugs below. It re-signs the Windows artifact in place before
      # the release step attaches it.
      #
      #   - uses: SignPath/github-action-submit-signing-request@v1
      #     with:
      #       api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #       organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      #       project-slug: llamachat
      #       signing-policy-slug: release-signing
      #       github-artifact-id: llamachat-windows-latest
      #       wait-for-completion: true
      #       output-artifact-directory: installers/llamachat-windows-latest
      #
      # Exact inputs: https://github.com/SignPath/github-action-submit-signing-request
      # -------------------------------------------------------------------------

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
