<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="0.55" stop-color="#5566ff"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf0ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#131f57" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- squircle tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <!-- soft top gloss -->
  <path d="M0 232 Q0 0 232 0 H792 Q1024 0 1024 232 V470 Q512 620 0 470 Z" fill="#ffffff" opacity="0.08"/>

  <!-- F monogram: stem + two arms (arms shorten downward, evoking performance tiers) -->
  <g fill="url(#mark)" filter="url(#shadow)">
    <rect x="352" y="296" width="120" height="432" rx="34"/>
    <rect x="352" y="296" width="346" height="120" rx="34"/>
    <rect x="352" y="474" width="252" height="112" rx="34"/>
  </g>

  <!-- spark: a small energy node top-right -->
  <g fill="#ffffff">
    <circle cx="726" cy="300" r="26" opacity="0.95"/>
    <path d="M726 258 l10 32 32 10 -32 10 -10 32 -10 -32 -32 -10 32 -10 z" opacity="0.55"/>
  </g>
</svg>
